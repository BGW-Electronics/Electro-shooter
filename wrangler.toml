# NEON SWARM — Cloudflare Workers deploy config.
# Your Git build runs `npx wrangler deploy`, which reads this file.

name = "electro-shooter"        # MUST match your Worker's name in the Cloudflare dashboard
main = "worker.js"              # entry point: serves /api/scores, falls back to static files
compatibility_date = "2026-06-01"

# Serve the static game (index.html, core.js, game.js, main.js, leaderboard.js)
# straight from the repo root. .assetsignore keeps server-side files unpublished.
[assets]
directory = "."
binding = "ASSETS"

# ---- Leaderboard database (optional) --------------------------------------
# The game deploys and plays fine WITHOUT this — the leaderboard just shows
# "offline". To turn the global leaderboard on:
#   1) wrangler d1 create neon-swarm-db          (or create it in the dashboard)
#   2) run schema.sql against that database
#   3) paste the database_id below, uncomment the 4 lines, commit + push
# [[d1_databases]]
# binding = "DB"
# database_name = "neon-swarm-db"
# database_id = "PASTE-YOUR-D1-DATABASE-ID-HERE"
