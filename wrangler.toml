# NEON SWARM — Cloudflare Workers deploy config.
# Your Git build runs `npx wrangler deploy`, which reads this file.

name = "electro-shooter"        # MUST match your Worker's name in the Cloudflare dashboard
main = "worker.js"              # entry point: serves /api/scores, falls back to static files
compatibility_date = "2026-06-01"

# Serve the static game (index.html, core.js, game.js, main.js, leaderboard.js)
# straight from the repo root. .assetsignore keeps server-side files unpublished.
[assets]
directory = "."
binding = "ASSETS"

# ---- Leaderboard database --------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "electro-shooter-db"
database_id = "56f63555-8333-4616-8a78-f86f596ab51d"
